<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="960" y1="0" x2="960" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F5F8"/>
    </linearGradient>
    <radialGradient id="orbRed" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1460 250) rotate(90) scale(240)">
      <stop stop-color="#DF0515" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#DF0515" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbGray" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1290 790) rotate(90) scale(290)">
      <stop stop-color="#8A909A" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#8A909A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shell" x1="1030" y1="110" x2="1790" y2="1010" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.95"/>
      <stop offset="1" stop-color="white" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#DF0515"/>
      <stop offset="1" stop-color="#7C0316"/>
    </linearGradient>
    <filter id="blurA" x="1080" y="-20" width="760" height="760" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
    <filter id="blurB" x="900" y="430" width="860" height="860" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
    <filter id="shadowSoft" x="820" y="110" width="920" height="900" filterUnits="userSpaceOnUse">
      <feOffset dy="18"/>
      <feGaussianBlur stdDeviation="18"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0666667 0 0 0 0 0.0745098 0 0 0 0 0.0941176 0 0 0 0.22 0"/>
      <feBlend mode="normal" in2="SourceGraphic" result="shape"/>
    </filter>
    <filter id="cardShadow" x="840" y="170" width="470" height="310" filterUnits="userSpaceOnUse">
      <feOffset dy="12"/>
      <feGaussianBlur stdDeviation="10"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0666667 0 0 0 0 0.0745098 0 0 0 0 0.0941176 0 0 0 0.2 0"/>
      <feBlend mode="normal" in2="SourceGraphic" result="shape"/>
    </filter>
    <filter id="cardShadow2" x="822" y="590" width="500" height="300" filterUnits="userSpaceOnUse">
      <feOffset dy="12"/>
      <feGaussianBlur stdDeviation="10"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0666667 0 0 0 0 0.0745098 0 0 0 0 0.0941176 0 0 0 0.2 0"/>
      <feBlend mode="normal" in2="SourceGraphic" result="shape"/>
    </filter>
    <filter id="cardShadow3" x="1450" y="390" width="300" height="340" filterUnits="userSpaceOnUse">
      <feOffset dy="12"/>
      <feGaussianBlur stdDeviation="10"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0666667 0 0 0 0 0.0745098 0 0 0 0 0.0941176 0 0 0 0.2 0"/>
      <feBlend mode="normal" in2="SourceGraphic" result="shape"/>
    </filter>
    <clipPath id="photoClip">
      <rect x="1066" y="146" width="688" height="828" rx="36"/>
    </clipPath>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <g filter="url(#blurA)">
    <circle cx="1460" cy="250" r="240" fill="url(#orbRed)"/>
  </g>
  <g filter="url(#blurB)">
    <circle cx="1290" cy="790" r="290" fill="url(#orbGray)"/>
  </g>

  <!-- Right visual shell -->
  <g filter="url(#shadowSoft)">
    <rect x="1030" y="110" width="760" height="900" rx="48" fill="url(#shell)" stroke="#DADFE6" stroke-width="2"/>
    <g clip-path="url(#photoClip)">
      <image href="./hero.png" x="1030" y="110" width="760" height="900" preserveAspectRatio="xMidYMid slice"/>
      <rect x="1066" y="146" width="688" height="828" fill="url(#bg)" opacity="0.09"/>
    </g>
    <rect x="1066" y="146" width="688" height="828" rx="36" fill="none" stroke="#E7EAEE" stroke-width="2"/>
  </g>

  <!-- Growth Card -->
  <g filter="url(#cardShadow)">
    <rect x="900" y="190" width="390" height="240" rx="22" fill="white" fill-opacity="0.96" stroke="#D8DDE4" stroke-width="2"/>
    <text x="926" y="224" fill="#68707A" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="2">CRESCIMENTO</text>
    <text x="926" y="274" fill="#111318" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">+38% no mês</text>
    <rect x="930" y="354" width="30" height="34" rx="8" fill="url(#bar)"/>
    <rect x="980" y="334" width="30" height="54" rx="8" fill="url(#bar)"/>
    <rect x="1030" y="318" width="30" height="70" rx="8" fill="url(#bar)"/>
    <rect x="1080" y="300" width="30" height="88" rx="8" fill="url(#bar)"/>
    <rect x="1130" y="274" width="30" height="114" rx="8" fill="url(#bar)"/>
    <rect x="1180" y="252" width="30" height="136" rx="8" fill="url(#bar)"/>
  </g>

  <!-- Conversion Card -->
  <g filter="url(#cardShadow2)">
    <rect x="882" y="610" width="412" height="240" rx="22" fill="white" fill-opacity="0.96" stroke="#D8DDE4" stroke-width="2"/>
    <text x="908" y="644" fill="#68707A" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="2">TAXA DE CONVERSÃO</text>
    <text x="908" y="694" fill="#111318" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">6.4% previsível</text>
    <polyline points="914,796 972,780 1032,766 1096,742 1162,710 1222,684 1266,664" stroke="#DF0515" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="972" cy="780" r="5" fill="#DF0515"/>
    <circle cx="1032" cy="766" r="5" fill="#DF0515"/>
    <circle cx="1096" cy="742" r="5" fill="#DF0515"/>
    <circle cx="1162" cy="710" r="5" fill="#DF0515"/>
    <circle cx="1222" cy="684" r="5" fill="#DF0515"/>
    <circle cx="1266" cy="664" r="5" fill="#DF0515"/>
  </g>

  <!-- Performance Card -->
  <g filter="url(#cardShadow3)">
    <rect x="1470" y="410" width="240" height="280" rx="22" fill="white" fill-opacity="0.96" stroke="#D8DDE4" stroke-width="2"/>
    <circle cx="1590" cy="508" r="58" fill="#DF0515"/>
    <circle cx="1590" cy="508" r="44" fill="white"/>
    <text x="1560" y="517" fill="#111318" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">100%</text>
    <text x="1512" y="612" fill="#68707A" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="2">PERFORMANCE</text>
  </g>
</svg>
